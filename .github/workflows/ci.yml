name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Unit tests (race)
        run: go test -race -count=1 ./...

      - name: Manageability feature e2e
        run: go test -count=1 ./internal/api/ -run TestAllManageabilityFeatures

      - name: Build
        run: make build
