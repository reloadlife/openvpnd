name: Smoke

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Mock-mode smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Build
        run: make build

      - name: Write temp config (mock backend)
        run: |
          mkdir -p /tmp/openvpnd/{conf,run,pki}
          cat > /tmp/ovpn.yaml <<'EOF'
          listen:
            http: "127.0.0.1:51980"
            metrics: "127.0.0.1:9092"
          db:
            path: "/tmp/openvpnd/state.db"
          auth:
            token: "test"
          public_base_url: "http://127.0.0.1:51980"
          openvpn:
            conf_dir: "/tmp/openvpnd/conf"
            runtime_dir: "/tmp/openvpnd/run"
            pki_dir: "/tmp/openvpnd/pki"
            default_binary: "default"
            binaries:
              default: "/usr/sbin/openvpn"
            use_mock_backend: true
          log:
            level: info
            format: text
          EOF

      - name: Start daemon and probe endpoints
        run: |
          set -euo pipefail
          ./bin/openvpnd run --config /tmp/ovpn.yaml &
          DAEMON_PID=$!
          cleanup() {
            kill "$DAEMON_PID" 2>/dev/null || true
            wait "$DAEMON_PID" 2>/dev/null || true
          }
          trap cleanup EXIT

          # Wait for HTTP to come up
          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:51980/healthz" >/dev/null 2>&1; then
              break
            fi
            if ! kill -0 "$DAEMON_PID" 2>/dev/null; then
              echo "daemon exited early" >&2
              exit 1
            fi
            sleep 0.5
          done

          echo "== healthz =="
          curl -fsS "http://127.0.0.1:51980/healthz"
          echo
          echo "== readyz =="
          curl -fsS "http://127.0.0.1:51980/readyz"
          echo
          echo "== /v1/version =="
          curl -fsS -H "Authorization: Bearer test" "http://127.0.0.1:51980/v1/version"
          echo

      - name: Master verify suite (if present)
        run: |
          if make -n test-verify >/dev/null 2>&1; then
            make test-verify
          else
            echo "make test-verify not defined; skipping"
          fi
