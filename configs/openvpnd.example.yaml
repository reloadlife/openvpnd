listen:
  http: "127.0.0.1:51980"
  # unix: "/run/openvpnd/openvpnd.sock"
  metrics: "127.0.0.1:9092"

snmp:
  enabled: false
  # Full SNMPv2c: GET / GETNEXT / GETBULK (SET → notWritable)
  listen: "127.0.0.1:1162"   # 1162 avoids clash with wireguardd (1161)
  community: "change-me-snmp"
  enterprise_oid: "1.3.6.1.4.1.66666.2"  # placeholder PEN (.1=wireguardd, .2=openvpnd)

db:
  path: "/var/lib/openvpnd/state.db"
  # timeseries_path: "/var/lib/openvpnd/timeseries.db"

auth:
  # Legacy single-token mode: treated as role=admin when `tokens` is empty.
  # MUST change; daemon refuses default unless OPENVPND_ALLOW_INSECURE=1
  token: "change-me"
  # Multi-token RBAC (when set, only these credentials are accepted):
  # tokens:
  #   - name: admin
  #     token: "replace-with-admin-token"
  #     role: admin      # full access
  #   - name: ops
  #     token: "replace-with-operator-token"
  #     role: operator   # mutate instances/clients/profiles; no DELETE CA / system backup
  #   - name: ro
  #     token: "replace-with-readonly-token"
  #     role: readonly   # GET/HEAD only

# production: true  # strict checks: non-default token required; warns if public_base_url empty

# Externally reachable base for client profile links (OpenVPN Connect import).
# Behind reverse proxy: https://vpn.example.com
# public_base_url: "https://vpn.example.com"

profile_links:
  default_ttl: 24h
  default_max_uses: 1   # single-use download; 0 = unlimited until expiry

openvpn:
  conf_dir: "/etc/openvpnd/instances"
  runtime_dir: "/run/openvpnd"
  pki_dir: "/var/lib/openvpnd/pki"
  persistence: "hybrid" # database | conf | hybrid
  default_binary: "default"
  # Named OpenVPN executables. Each instance can pin binary_name or binary_path.
  binaries:
    default: "/usr/sbin/openvpn"
    # v24: "/opt/openvpn-2.4/sbin/openvpn"
    # v26: "/opt/openvpn-2.6/sbin/openvpn"
  sample_interval: 5s
  reconcile_interval: 5s
  allow_hooks: false
  # use_mock_backend: true  # for dev/CI without openvpn binary
  adopt_on_start: false
  # When true, POST /v1/instances/adopt with take_over=true may SIGTERM (then
  # SIGKILL after 5s) a verified openvpn PID from discover. Never signals
  # openvpnd/openvpnctl. Set false to restore notes-only take_over.
  adopt_takeover_enabled: true
  # Bandwidth (role-aware):
  #   server peers — Client.bandwidth_* (need static_ip + instance device for tc)
  #   client tunnels — Instance.bandwidth_* whole-device
  #   off | tc | shaper | log  (production template defaults to tc when ready)
  bandwidth_enforcement: "off"

# External controller push (optional). See docs/CONFIGURATION.md § Webhooks.
webhooks:
  enabled: false
  # url: "https://controller.example/hooks/openvpnd"
  # secret: "shared-hmac-secret"
  # events: ["*"]
  # timeout: 5s

log:
  level: info
  format: json

read_only: false
production: false
